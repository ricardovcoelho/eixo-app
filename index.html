<!DOCTYPE html>

<title>Eixo — Produtividade com OKRs</title>

<body>

<div id="auth-screen" style="display:none">
  <div class="auth-wrap">
    <div class="auth-card">
      <div class="auth-logo">E</div>
      <div class="auth-title">Eixo</div>
      <div class="auth-sub">Produtividade com OKRs</div>
      <div id="auth-login">
        <div class="fg"><label>Email</label><input id="login-email" type="email" placeholder="seu@email.com"></div>
        <div class="fg"><label>Senha</label><input id="login-password" type="password" placeholder="••••••••"></div>
        <div id="login-error" class="auth-error" style="display:none"></div>
        <button class="auth-btn" id="btn-login">Entrar</button>
        <div class="auth-switch">Não tem conta? <span id="goto-signup">Criar conta</span></div>
      </div>
      <div id="auth-signup" style="display:none">
        <div class="fg"><label>Seu nome</label><input id="signup-name" placeholder="Como quer ser chamado?"></div>
        <div class="fg"><label>Email</label><input id="signup-email" type="email" placeholder="seu@email.com"></div>
        <div class="fg"><label>Senha</label><input id="signup-password" type="password" placeholder="Mínimo 6 caracteres"></div>
        <div class="fg"><label>Confirmar senha</label><input id="signup-confirm" type="password" placeholder="Repita a senha"></div>
        <div id="signup-error" class="auth-error" style="display:none"></div>
        <button class="auth-btn" id="btn-signup">Criar conta</button>
        <div class="auth-switch">Já tem conta? <span id="goto-login">Entrar</span></div>
      </div>
    </div>
  </div>
</div>
